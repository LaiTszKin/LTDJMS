name: "Deploy Landing Page to Vercel"

on:
  push:
    branches: ["main"]
    paths:
      - "src/main/resources/web/**"
  workflow_dispatch:

concurrency:
  group: "vercel-landing-page-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
  VERCEL_TRUSTED_AUTHORS: ${{ vars.VERCEL_TRUSTED_AUTHORS }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Validate deployment configuration"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          missing=0
          for required_value in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_TRUSTED_AUTHORS; do
            if [ -z "${!required_value}" ]; then
              echo "::error::Missing required GitHub secret or variable: ${required_value}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: "Check trusted author"
        id: trust
        uses: actions/github-script@v7
        with:
          script: |
            const trustedAuthors = (process.env.VERCEL_TRUSTED_AUTHORS || '')
              .split(',')
              .map((item) => item.trim().toLowerCase())
              .filter(Boolean);

            const commit = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });

            const identities = [
              context.actor,
              commit.data.author?.login,
              commit.data.committer?.login,
            ]
              .filter(Boolean)
              .map((item) => item.toLowerCase());

            const matchedIdentity = identities.find((item) =>
              trustedAuthors.includes(item)
            );

            core.setOutput('trusted', matchedIdentity ? 'true' : 'false');
            core.setOutput('matched_identity', matchedIdentity || '');
            core.setOutput('checked_identities', identities.join(', '));

            if (matchedIdentity) {
              core.notice(`Trusted identity matched: ${matchedIdentity}`);
            } else {
              core.notice(
                `Skip deployment because none of these identities are trusted: ${identities.join(', ')}`
              );
            }

      - name: "Skip untrusted deployment"
        if: steps.trust.outputs.trusted != 'true'
        run: |
          echo "Deployment skipped because the trigger is not from a trusted author."
          echo "Checked identities: ${{ steps.trust.outputs.checked_identities }}"

      - name: "Set up Node.js"
        if: steps.trust.outputs.trusted == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: "Prepare landing page bundle"
        if: steps.trust.outputs.trusted == 'true'
        id: prepare
        run: |
          deploy_dir="$(mktemp -d)"
          cp src/main/resources/web/index.html "${deploy_dir}/index.html"
          cat > "${deploy_dir}/vercel.json" <<'JSON'
          {
            "$schema": "https://openapi.vercel.sh/vercel.json",
            "cleanUrls": true
          }
          JSON
          echo "deploy_dir=${deploy_dir}" >> "${GITHUB_OUTPUT}"

      - name: "Link Vercel project"
        if: steps.trust.outputs.trusted == 'true'
        working-directory: ${{ steps.prepare.outputs.deploy_dir }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: "Deploy to Vercel production"
        if: steps.trust.outputs.trusted == 'true'
        id: deploy
        working-directory: ${{ steps.prepare.outputs.deploy_dir }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deploy_output="$(npx vercel@latest deploy --prod --yes --token="${VERCEL_TOKEN}" 2>&1)"
          printf '%s\n' "${deploy_output}"
          deployment_url="$(printf '%s\n' "${deploy_output}" | grep -Eo 'https://[^ ]+' | tail -n 1)"
          if [ -z "${deployment_url}" ]; then
            echo "::error::Failed to parse Vercel deployment URL"
            exit 1
          fi
          echo "deployment_url=${deployment_url}" >> "${GITHUB_OUTPUT}"

      - name: "Write deployment summary"
        if: steps.trust.outputs.trusted == 'true'
        run: |
          {
            echo "### Landing page deployed to Vercel"
            echo
            echo "- Trigger actor: \`${{ github.actor }}\`"
            echo "- Trusted identity: \`${{ steps.trust.outputs.matched_identity }}\`"
            echo "- Deployment URL: ${{ steps.deploy.outputs.deployment_url }}"
          } >> "${GITHUB_STEP_SUMMARY}"
