services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: currency_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d currency_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DB_URL: jdbc:postgresql://postgres:5432/currency_bot
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    restart: unless-stopped

volumes:
  postgres_data:
